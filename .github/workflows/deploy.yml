name: Deploy to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  web-deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 🛠️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, bcmath, sqlite3

      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Composer Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: 📦 Install NPM Dependencies & Build
        run: |
          npm install
          npm run build

      - name: 🛠️ Fix index.php path for cPanel split structure
        run: |
          sed -i "s|require __DIR__.'/../vendor/autoload.php'|require __DIR__.'/../daser_scheduler/vendor/autoload.php'|g" public/index.php
          sed -i "s|require_once __DIR__.'/../bootstrap/app.php'|require_once __DIR__.'/../daser_scheduler/bootstrap/app.php'|g" public/index.php
          sed -i "s|__DIR__.'/../storage/framework/maintenance.php'|__DIR__.'/../daser_scheduler/storage/framework/maintenance.php'|g" public/index.php

      - name: 📂 Sync Core App (daser_scheduler)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ./daser_scheduler/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/public/**
            **/tests/**
            **/storage/logs/**
            .env
            phpunit.xml
            README.md

      - name: 📂 Sync Public Assets (public_html)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: ./public_html/
